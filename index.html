<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="mall-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="#00b7af"/>
        <path d="M8 26V14l10-7 10 7v12H22v-7h-8v7H8z" fill="white"/>
      </svg>
      <span class="mall-name">Westfield<span>Mall</span></span>
    </div>
  </div>
  <div class="header-center">
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search stores, restaurants, services..." autocomplete="off">
      <button class="clear-btn" id="clearSearch" style="display:none">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="header-right">
    <div class="floor-selector">
      <button class="floor-btn active" data-floor="1">Floor 1</button>
      <button class="floor-btn" data-floor="2">Floor 2</button>
    </div>
    <div class="time-display" id="timeDisplay"></div>
  </div>
</header>
